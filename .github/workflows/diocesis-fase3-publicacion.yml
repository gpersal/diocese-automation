name: diocesis-fase3-publicacion
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "YYYY-MM-DD (opcional; por defecto hoy en America/Bogota)"
        required: false
        type: string
      days_ahead:
        description: "Cantidad de dias a preparar (default: 3)"
        required: false
        default: "3"
        type: string
      author_name:
        description: "Autor requerido en el formulario (Ej: Monseñor Nombre Apellido)"
        required: false
        type: string

jobs:
  fase3-publicacion:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      TZ: America/Bogota
      DIOCESIS_USERNAME: ${{ secrets.DIOCESIS_USERNAME }}
      DIOCESIS_PASSWORD: ${{ secrets.DIOCESIS_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run (stub)
        run: |
          python scripts/fase3_publicacion.py \
            --start-date "${{ inputs.start_date }}" \
            --days-ahead "${{ inputs.days_ahead }}" \
            --author-name "${{ inputs.author_name }}"
